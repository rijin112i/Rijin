    const ParticleBackground = () => {
      const containerRef = useRef(null);
      useEffect(() => {
        if (!containerRef.current) return;
        const container = containerRef.current;
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030014, 0.015);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 50;
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const particleCount = 15000;
        const particlesGeo = new THREE.BufferGeometry();
        const posArray = new Float32Array(particleCount * 3);
        const basePosArray = new Float32Array(particleCount * 3);
        const colorsArray = new Float32Array(particleCount * 3);
        const baseColor = new THREE.Color(0x001f3f);
        
        for (let i = 0; i < particleCount * 3; i++) {
          const val = (Math.random() - 0.5) * 150;
          posArray[i] = val; basePosArray[i] = val;
          if (i % 3 === 0) {
            colorsArray[i] = baseColor.r; colorsArray[i+1] = baseColor.g; colorsArray[i+2] = baseColor.b;
          }
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particlesGeo.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));
        const particleMaterial = new THREE.PointsMaterial({ size: 0.5, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.2 });
        const particlesMesh = new THREE.Points(particlesGeo, particleMaterial);
        scene.add(particlesMesh);

        const lineCount = 530;
        const linesGeo = new THREE.BufferGeometry();
        const linePosArray = new Float32Array(lineCount * 6); 
        for (let i = 0; i < lineCount; i++) {
          const x = (Math.random() - 0.5) * 100, y = (Math.random() - 0.5) * 100, z = (Math.random() - 0.5) * 100;
          linePosArray[i*6] = x; linePosArray[i*6+1] = y; linePosArray[i*6+2] = z;
          linePosArray[i*6+3] = x; linePosArray[i*6+4] = y; linePosArray[i*6+5] = z + Math.random() * 5 + 2; 
        }
        linesGeo.setAttribute('position', new THREE.BufferAttribute(linePosArray, 3));
        const lineMaterial = new THREE.LineDashedMaterial({ color: 0x88aaff, linewidth: 1, transparent: true, opacity: 0.20, dashSize: 1, gapSize: 2 });
        const linesMesh = new THREE.LineSegments(linesGeo, lineMaterial);
        linesMesh.computeLineDistances();
        scene.add(linesMesh);

        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.8, 0.1, 1.0);
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        const mouse = new THREE.Vector2(0, 0);
        const targetColor = new THREE.Color('#CCFF00');
        let mouseActive = false;
        const onMouseMove = (event) => { mouse.x = (event.clientX / window.innerWidth) * 2 - 1; mouse.y = -(event.clientY / window.innerHeight) * 2 + 1; mouseActive = true; };
        window.addEventListener('mousemove', onMouseMove);

        const raycaster = new THREE.Raycaster();
        const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        const intersectPoint = new THREE.Vector3();
        let animationFrameId;

        const animate = () => {
          const linePositions = linesGeo.attributes.position.array;
          for (let i = 0; i < lineCount; i++) {
            linePositions[i*6+2] += 0.2; linePositions[i*6+5] += 0.2;
            if (linePositions[i*6+2] > 50) {
              linePositions[i*6+2] = -50; linePositions[i*6+5] = -50 + Math.random() * 5 + 2;
            }
          }
          linesGeo.attributes.position.needsUpdate = true;

          if (mouseActive) {
            raycaster.setFromCamera(mouse, camera);
            raycaster.ray.intersectPlane(plane, intersectPoint);
            const positions = particlesGeo.attributes.position.array;
            const colors = particlesGeo.attributes.color.array;

            for (let i = 0; i < particleCount; i++) {
              const idx = i * 3;
              const px = positions[idx], py = positions[idx + 1], pz = positions[idx + 2];
              const bx = basePosArray[idx], by = basePosArray[idx + 1], bz = basePosArray[idx + 2];
              const dx = px - intersectPoint.x, dy = py - intersectPoint.y;
              const distSq = dx * dx + dy * dy;

              if (distSq < 400 && Math.abs(pz) < 10) {
                const force = (400 - distSq) * 0.04;
                const angle = Math.atan2(dy, dx);
                positions[idx] += Math.cos(angle) * force * 0.1; positions[idx + 1] += Math.sin(angle) * force * 0.1;
                colors[idx] += (targetColor.r - colors[idx]) * 0.4; colors[idx + 1] += (targetColor.g - colors[idx + 1]) * 0.4; colors[idx + 2] += (targetColor.b - colors[idx + 2]) * 0.4;
              } else {
                positions[idx] += (bx - px) * 0.05; positions[idx + 1] += (by - py) * 0.05; positions[idx + 2] += (bz - pz) * 0.05;
                colors[idx] += (baseColor.r - colors[idx]) * 0.05; colors[idx + 1] += (baseColor.g - colors[idx + 1]) * 0.05; colors[idx + 2] += (baseColor.b - colors[idx + 2]) * 0.05;
              }
            }
            particlesGeo.attributes.position.needsUpdate = true;
            particlesGeo.attributes.color.needsUpdate = true;
          }
          particlesMesh.rotation.y += 0.0005;
          composer.render();
          animationFrameId = requestAnimationFrame(animate);
        };
        animate();

        const handleResize = () => {
          camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
        };
        window.addEventListener('resize', handleResize);
        return () => {
          window.removeEventListener('resize', handleResize); window.removeEventListener('mousemove', onMouseMove);
          cancelAnimationFrame(animationFrameId); container.removeChild(renderer.domElement);
          renderer.dispose();
        };
      }, []);
      
      return <div ref={containerRef} className="fixed inset-0 z-0 pointer-events-none transition-all duration-700 invert opacity-[0.15] dark:invert-0 dark:opacity-100" />;
    };

    const ScrambleText = ({ words }) => {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*';
      const [index, setIndex] = useState(0);
      const [displayText, setDisplayText] = useState(words[0]);
      useEffect(() => {
        const interval = setInterval(() => { setIndex((prev) => (prev + 1) % words.length); }, 4000);
        return () => clearInterval(interval);
      }, [words.length]);
      useEffect(() => {
        const target = words[index];
        let iteration = 0;
        const interval = setInterval(() => {
          setDisplayText((prev) => target.split('').map((char, i) => {
            if (char === ' ') return ' ';
            if (i < iteration / 2) return target[i];
            return chars[Math.floor(Math.random() * chars.length)];
          }).join(''));
          if (iteration >= 30) { clearInterval(interval); setDisplayText(target); }
          iteration++;
        }, 30);
        return () => clearInterval(interval);
      }, [index, words]);
      return <span className="font-display tracking-tight text-accentLight dark:text-accent">{displayText}</span>;
    };
